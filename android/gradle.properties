org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -Dfile.encoding=UTF-8

org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true
android.useAndroidX=true
android.enableJetifier=true
# Some plugins (e.g. screen_protector) compile their Java at 17 but let Kotlin
# default to the toolchain JDK (21). Gradle 9's stricter check fails that
# mismatch; downgrade it to a warning. Safe on Android: D8/R8 dexing normalizes
# the JVM bytecode version regardless.
kotlin.jvm.target.validation.mode=warning
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
